<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Welcome</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f4f5;
      font-family: Arial, sans-serif;
    "
  >
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center" style="padding: 40px 20px">
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="background: #ffffff; border-radius: 12px; overflow: hidden"
          >
            <tr>
              <td
                style="background: #111827; padding: 32px; text-align: center"
              >
                <h1 style="color: #ffffff; margin: 0; font-size: 28px">
                  Welcome 🎉
                </h1>
              </td>
            </tr>

            <tr>
              <td style="padding: 40px 32px; color: #374151">
                <h2 style="margin-top: 0; font-size: 24px; color: #111827">
                  Hi {{name}},
                </h2>

                <p style="font-size: 16px; line-height: 1.7">
                  Your account has been successfully created. We're excited to
                  have you with us.
                </p>

                <p style="font-size: 16px; line-height: 1.7">
                  You can now explore products, place orders, and manage your
                  account seamlessly.
                </p>

                <div style="margin-top: 32px; text-align: center">
                  <a
                    href="{{storeUrl}}"
                    style="
                      background: #111827;
                      color: #ffffff;
                      text-decoration: none;
                      padding: 14px 28px;
                      border-radius: 8px;
                      display: inline-block;
                      font-weight: bold;
                    "
                    target="_blank"
                  >
                    Visit Store
                  </a>
                </div>
              </td>
            </tr>

            <tr>
              <td
                style="
                  padding: 24px;
                  text-align: center;
                  color: #9ca3af;
                  font-size: 13px;
                "
              >
                © 2026 Your Store. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
